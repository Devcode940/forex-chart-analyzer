name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.10, 3.11]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Dev tools for linting and static checks
          pip install --no-cache-dir black isort flake8 mypy pytest

      - name: Run black (format)
        run: |
          black .

      - name: Run isort (format)
        run: |
          isort .

      - name: Create branch and open PR if formatting changed
        id: pr
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "chore: apply automatic formatting (black + isort)"
          branch: "ci/format-fixes"
          title: "chore: auto-format code (black + isort)"
          body: |
            This PR was opened automatically by CI to apply formatting fixes from black and isort.

            If you prefer CI to commit directly to main, update the workflow accordingly.
          base: main
          committer: GitHub Actions <actions@github.com>
          author: GitHub Actions <actions@github.com>
          delete-branch: false

      - name: Run black (check)
        run: black --check .

      - name: Run isort (check)
        run: isort --check-only .

      - name: Run flake8
        run: flake8 .

      - name: Run mypy
        run: mypy --ignore-missing-imports .

      - name: Run validation script
        env:
          PYTHONUNBUFFERED: 1
        run: |
          echo "--- Running test_pipeline.py (verbose) ---"
          python -u test_pipeline.py
